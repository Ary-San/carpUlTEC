services:
  postgres:
    container_name: carpultec-db
    image: postgres:17

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  carpultec:
    container_name: carpultec-app

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      osrm:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}  
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
      OSRM_URL: ${OSRM_URL:-http://osrm:5000}
      BUCKET_NAME: ${BUCKET_NAME}
      AWS_REGION: ${AWS_REGION}
  osrm-prepare:
    container_name: osrm-prepare
    image: osrm/osrm-backend:latest

    volumes:
      - ./data:/data

    command: >
      sh -c "
      set -eu;
      pbf=/data/peru-260523.osm.pbf;
      osrm=/data/peru-260523.osrm;
      if [ ! -f \"$$pbf\" ]; then
        echo \"Missing PBF file: $$pbf\";
        echo \"Place your map file at ./data/peru-260523.osm.pbf\";
        exit 1;
      fi;
      if [ -f \"$$osrm\" ] && [ -f \"/data/peru-260523.osrm.partition\" ] && [ -f \"/data/peru-260523.osrm.cells\" ]; then
        echo \"OSRM dataset already prepared for peru-260523\";
      else
        osrm-extract -p /opt/car.lua \"$$pbf\";
        osrm-partition \"$$osrm\";
        osrm-customize \"$$osrm\";
      fi
      "

    restart: "no"

  osrm:
    container_name: osrm-backend
    image: osrm/osrm-backend:latest

    ports:
      - "5000:5000"

    volumes:
      - ./data:/data

    depends_on:
      osrm-prepare:
        condition: service_completed_successfully

    command: >
      sh -c "
      osrm-routed --algorithm mld /data/peru-260523.osrm
      "

    restart: unless-stopped
volumes:
  postgres_data: