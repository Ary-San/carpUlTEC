spring.application.name=demoCarpultec
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.security.jwt.secret=${JWT_SECRET}
spring.security.jwt.expiration=${JWT_EXPIRATION}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
springdoc.swagger-ui.path=/api/docs
spring.jpa.open-in-view=false
aws.region=${AWS_REGION}
frontend.url=${FRONTEND_URL}
osmr.url=${OSMR_URL}
spring.mail.properties.mail.smtp.starttls.required=true
maps.utec.latitude=${MAPS_UTEC_LATITUDE:-12.1352}
maps.utec.longitude=${MAPS_UTEC_LONGITUDE:-77.0222}
maps.utec.search-radius-meters=${MAPS_UTEC_SEARCH_RADIUS_METERS:3000}
maps.utec.max-results=${MAPS_UTEC_MAX_RESULTS:20}