<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Bienvenido a la app</title>
	<style>
		:root {
			--utec-blue: #003B5C;
			--bright-blue: #0057FF;
			--black: #000000;
			--dark-gray: #2B2B2B;
			--light-gray: #E5E5E5;
			--white: #FFFFFF;
		}
		body { margin: 0; padding: 0; background: var(--light-gray); color: var(--black); font-family: Arial, Helvetica, sans-serif; }
		.wrapper { width: 100%; padding: 32px 16px; box-sizing: border-box; }
		.card { max-width: 680px; margin: 0 auto; background: var(--white); border: 1px solid var(--light-gray); border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08); }
		.header { background: linear-gradient(135deg, var(--utec-blue), var(--bright-blue)); color: var(--white); padding: 32px; }
		.brand { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.9; }
		h1 { margin: 12px 0 0; font-size: 32px; line-height: 1.1; }
		.content { padding: 32px; }
		.lead { font-size: 17px; line-height: 1.6; color: var(--dark-gray); margin: 0; }
		.details { margin: 24px 0; padding: 0; list-style: none; }
		.detail { display: flex; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--light-gray); }
		.label { color: var(--dark-gray); font-weight: 700; }
		.value { color: var(--black); font-weight: 600; text-align: right; }
		.button { display: inline-block; margin-top: 24px; background: var(--bright-blue); color: var(--white) !important; text-decoration: none; padding: 14px 24px; border-radius: 999px; font-weight: 700; }
		.button-secondary { display: inline-block; margin-top: 12px; margin-left: 12px; background: var(--utec-blue); color: var(--white) !important; text-decoration: none; padding: 14px 24px; border-radius: 999px; font-weight: 700; }
		.footer { padding: 24px 32px 32px; background: #fafafa; color: var(--dark-gray); font-size: 13px; line-height: 1.6; }
	</style>
</head>
<body>
<div class="wrapper">
	<div class="card">
		<div class="header">
			<div class="brand" th:text="${appName}">CarpulTEC</div>
			<h1 th:text="${title}">Bienvenido a la app</h1>
		</div>
		<div class="content">
			<p class="lead">Hola <strong th:text="${recipientName}">Usuario</strong>,</p>
			<p class="lead" th:text="${message}">Tu cuenta fue verificada correctamente.</p>
			<ul class="details">
				<li class="detail" th:each="item : ${details.entrySet()}">
					<span class="label" th:text="${item.key}">Etiqueta</span>
					<span class="value" th:text="${item.value}">Valor</span>
				</li>
			</ul>
			<a class="button" th:href="${actionUrl}" th:text="${actionLabel}">Verificar cuenta</a>
			<a class="button-secondary" th:if="${secondaryActionUrl != null}" th:href="${secondaryActionUrl}" th:text="${secondaryActionLabel}">Abrir la app</a>
		</div>
		<div class="footer">Si no solicitaste este correo, puedes ignorarlo.</div>
	</div>
</div>
</body>
</html>
